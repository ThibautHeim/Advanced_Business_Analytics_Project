<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --color-bg: #f7f6f2;
    --color-surface: #f9f8f5;
    --color-primary: #01696f;
    --color-primary-hover: #0c4e54;
    --color-text: #28251d;
    --color-text-muted: #7a7974;
    --color-border: #d4d1ca;
    --color-dir0: #01696f;
    --color-dir1: #964219;
    --font-body: 'Satoshi', 'Inter', sans-serif;
    --radius-md: 0.5rem;
    --radius-lg: 0.75rem;
    --space-2: 0.5rem;
    --space-3: 0.75rem;
    --space-4: 1rem;
    --space-6: 1.5rem;
    --space-8: 2rem;
    --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
    --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
    --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
    --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
    --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
    --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  html, body { height: 100%; }
  body {
    font-family: var(--font-body);
    background: var(--color-bg);
    color: var(--color-text);
    display: flex;
    flex-direction: column;
  }
  /* Header */
  header {
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    padding: var(--space-4) var(--space-6);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-4);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: var(--space-3); }
  .logo {
    width: 36px; height: 36px;
    background: var(--color-primary);
    border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 1rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  header h1 { font-size: var(--text-lg); font-weight: 600; line-height: 1.2; }
  header p { font-size: var(--text-sm); color: var(--color-text-muted); margin-top: 2px; }
  /* Legend */
  .legend {
    display: flex;
    gap: var(--space-4);
    align-items: center;
    flex-shrink: 0;
  }
  .legend-item {
    display: flex; align-items: center; gap: var(--space-2);
    font-size: var(--text-sm); color: var(--color-text-muted);
    padding: var(--space-2) var(--space-3);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    background: var(--color-bg);
    cursor: pointer;
    transition: background var(--transition), border-color var(--transition);
    user-select: none;
  }
  .legend-item:hover { background: white; border-color: var(--color-primary); }
  .legend-item.active { border-color: var(--color-primary); background: white; }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
  }
  .dot-dir0 { background: var(--color-dir0); }
  .dot-dir1 { background: var(--color-dir1); }
  /* Main layout */
  .main {
    display: grid;
    grid-template-columns: 280px 1fr;
    flex: 1;
    overflow: hidden;
  }
  /* Sidebar */
  .sidebar {
    background: var(--color-surface);
    border-right: 1px solid var(--color-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: var(--space-4);
    border-bottom: 1px solid var(--color-border);
    font-size: var(--text-sm);
    color: var(--color-text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .stop-count {
    background: var(--color-primary);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 999px;
  }
  .stop-list { overflow-y: auto; flex: 1; }
  .stop-item {
    padding: var(--space-3) var(--space-4);
    border-bottom: 1px solid oklch(from var(--color-border) l c h / 0.5);
    cursor: pointer;
    transition: background var(--transition);
    display: flex;
    align-items: center;
    gap: var(--space-3);
  }
  .stop-item:hover { background: var(--color-bg); }
  .stop-item.active { background: white; border-left: 3px solid var(--color-primary); }
  .stop-num {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--color-text-muted);
    min-width: 20px;
    text-align: center;
  }
  .stop-info {}
  .stop-name { font-size: var(--text-sm); font-weight: 500; line-height: 1.3; }
  .stop-obs { font-size: 0.75rem; color: var(--color-text-muted); margin-top: 1px; }
  /* Direction tabs */
  .dir-tabs {
    display: flex;
    border-bottom: 1px solid var(--color-border);
  }
  .dir-tab {
    flex: 1;
    padding: var(--space-3) var(--space-4);
    font-size: var(--text-sm);
    font-weight: 500;
    color: var(--color-text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all var(--transition);
    text-align: center;
  }
  .dir-tab:hover { color: var(--color-text); }
  .dir-tab.active-tab {
    color: var(--color-primary);
    border-bottom-color: var(--color-primary);
  }
  /* Map */
  #map { flex: 1; z-index: 1; }
  /* Code block */
  .code-banner {
    background: #1c1b19;
    color: #cdccca;
    font-family: 'Courier New', monospace;
    font-size: 0.8rem;
    padding: var(--space-3) var(--space-6);
    border-top: 1px solid #393836;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: var(--space-4);
  }
  .code-label { color: #4f98a3; font-weight: 700; }
  /* Tooltip popup */
  .leaflet-popup-content-wrapper {
    border-radius: var(--radius-lg) !important;
    box-shadow: var(--shadow-md) !important;
    border: 1px solid var(--color-border);
  }
  .popup-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
  .popup-sub { color: var(--color-text-muted); font-size: 0.8rem; }
  @media (max-width: 640px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .legend { gap: var(--space-2); }
    .legend-item span { display: none; }
  }
</style>

<header>

</header>

<div class="main">

    <div class="stop-list" id="stop-list"></div>
  </div>
  <div id="map"></div>
</div>

const colors = { 0: '#01696f', 1: '#964219' };
const visibleDirs = { 0: true, 1: true };
let activeDir = 0;
let markers = { 0: [], 1: [] };
let polylines = { 0: null, 1: null };

// ── MAP INIT ─────────────────────────────────────────────────────────────────
const map = L.map('map').setView([40.640, -73.980], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CartoDB',
  maxZoom: 19
}).addTo(map);

function makeIcon(dir, idx) {
  const color = colors[dir];
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">
    <circle cx="16" cy="16" r="14" fill="${color}" stroke="white" stroke-width="2.5"/>
    <text x="16" y="21" text-anchor="middle" fill="white" font-size="11" font-weight="700" font-family="sans-serif">${idx+1}</text>
    <line x1="16" y1="30" x2="16" y2="40" stroke="${color}" stroke-width="2.5"/>
  </svg>`;
  return L.divIcon({
    html: svg, className: '', iconSize: [32, 40], iconAnchor: [16, 40], popupAnchor: [0, -40]
  });
}

function renderStops() {
  // Clear existing
  Object.values(markers).flat().forEach(m => map.removeLayer(m));
  markers = { 0: [], 1: [] };
  [0, 1].forEach(dir => { if (polylines[dir]) { map.removeLayer(polylines[dir]); polylines[dir] = null; } });

  [0, 1].forEach(dir => {
    if (!visibleDirs[dir]) return;
    const stops = stopsData[dir];
    const latlngs = stops.map(s => [s.lat, s.lng]);

    // Polyline
    polylines[dir] = L.polyline(latlngs, {
      color: colors[dir], weight: 3, opacity: 0.6, dashArray: '6 4'
    }).addTo(map);

    // Markers
    stops.forEach((stop, idx) => {
      const m = L.marker([stop.lat, stop.lng], { icon: makeIcon(dir, idx) })
        .addTo(map)
        .bindPopup(`
          <div class="popup-title">${stop.name}</div>
          <div class="popup-sub">Direction ${dir} · Stop ${idx + 1} of ${stops.length}</div>
          <div class="popup-sub" style="margin-top:4px">📍 ${stop.lat.toFixed(5)}, ${stop.lng.toFixed(5)}</div>
          <div class="popup-sub">🔢 ${stop.obs.toLocaleString()} observations</div>
        `);
      markers[dir].push(m);
    });
  });

  renderSidebar();
}

function renderSidebar() {
  const list = document.getElementById('stop-list');
  const stops = stopsData[activeDir];
  document.getElementById('stop-count').textContent = stops.length;
  list.innerHTML = stops.map((s, i) => `
    <div class="stop-item" onclick="flyToStop(${activeDir}, ${i})">
      <div class="stop-num" style="color:${colors[activeDir]}">${i+1}</div>
      <div class="stop-info">
        <div class="stop-name">${s.name}</div>
        <div class="stop-obs">${s.obs.toLocaleString()} observations</div>
      </div>
    </div>
  `).join('');
}

function flyToStop(dir, idx) {
  const s = stopsData[dir][idx];
  map.flyTo([s.lat, s.lng], 16, { duration: 0.8 });
  if (markers[dir][idx]) markers[dir][idx].openPopup();
  document.querySelectorAll('.stop-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

function toggleDirection(dir, el) {
  visibleDirs[dir] = !visibleDirs[dir];
  el.classList.toggle('active');
  renderStops();
}

function switchTab(dir, el) {
  activeDir = dir;
  document.querySelectorAll('.dir-tab').forEach((t, i) => t.classList.toggle('active-tab', i === dir));
  renderSidebar();
}

// Initial render
renderStops();
</script>
